<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>东莞门店盘点完成情况实时看板</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --card2: #1c2230;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --orange: #ffa657;
      --cyan: #39d353;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a2332 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .header-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(63,185,80,.15);
      border: 1px solid rgba(63,185,80,.4);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px; color: var(--green);
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.7); }
    }
    .update-time { font-size: 12px; color: var(--muted); }

    /* ── Summary Cards ── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      padding: 24px 32px 0;
    }
    .sum-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .sum-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .sum-card.blue::before  { background: var(--blue); }
    .sum-card.green::before { background: var(--green); }
    .sum-card.yellow::before{ background: var(--yellow); }
    .sum-card.red::before   { background: var(--red); }
    .sum-card.purple::before{ background: var(--purple); }
    .sum-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .sum-value { font-size: 30px; font-weight: 700; line-height: 1; }
    .sum-card.blue  .sum-value { color: var(--blue); }
    .sum-card.green .sum-value { color: var(--green); }
    .sum-card.yellow .sum-value { color: var(--yellow); }
    .sum-card.red   .sum-value { color: var(--red); }
    .sum-card.purple .sum-value { color: var(--purple); }
    .sum-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── Main Grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      padding: 16px 32px 24px;
    }

    /* ── Table Card ── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 15px; font-weight: 600; }
    .filter-row { display: flex; gap: 8px; }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      background: var(--card2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(48,54,61,.6);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(88,166,255,.05); }
    tbody td {
      padding: 11px 14px;
      font-size: 13px;
      white-space: nowrap;
    }
    .store-name { font-weight: 500; }
    .store-area { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
    .badge.done   { background: rgba(63,185,80,.15);  color: var(--green);  }
    .badge.done   .badge-dot { background: var(--green); }
    .badge.going  { background: rgba(88,166,255,.15); color: var(--blue);   }
    .badge.going  .badge-dot { background: var(--blue); animation: pulse 1.2s infinite; }
    .badge.wait   { background: rgba(139,148,158,.12); color: var(--muted); }
    .badge.wait   .badge-dot { background: var(--muted); }

    /* Progress bar */
    .prog-wrap { display: flex; align-items: center; gap: 8px; }
    .prog-bar {
      flex: 1; height: 6px;
      background: rgba(48,54,61,.8);
      border-radius: 3px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; border-radius: 3px;
      transition: width .6s ease;
    }
    .prog-pct { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; }

    /* Diff */
    .diff-pos { color: var(--red); }
    .diff-neg { color: var(--green); }
    .diff-zero { color: var(--muted); }

    /* ── Right Panel ── */
    .right-panel { display: flex; flex-direction: column; gap: 16px; }

    /* Donut */
    .donut-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .donut-wrap {
      display: flex; align-items: center; gap: 20px; margin-top: 14px;
    }
    .donut-svg { flex-shrink: 0; }
    .donut-legend { flex: 1; }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; font-size: 13px;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { flex: 1; color: var(--muted); }
    .legend-val { font-weight: 600; }

    /* Bar chart */
    .bar-chart { margin-top: 14px; }
    .bar-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .bar-label { font-size: 12px; color: var(--muted); width: 70px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 14px; background: rgba(48,54,61,.8); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
    .bar-num { font-size: 12px; color: var(--muted); min-width: 32px; text-align: right; }

    /* Alert list */
    .alert-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .alert-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(48,54,61,.5);
      font-size: 12px;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .alert-text { color: var(--text); line-height: 1.5; }
    .alert-time { color: var(--muted); font-size: 11px; margin-top: 2px; }

    /* ── Type Summary Cards ── */
    .type-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .type-sum-card {
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      overflow: hidden;
    }
    .type-sum-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .type-sum-card.ts-short  { background: rgba(88,166,255,.06); }
    .type-sum-card.ts-short::before  { background: var(--blue); }
    .type-sum-card.ts-weekly { background: rgba(188,140,255,.06); }
    .type-sum-card.ts-weekly::before { background: var(--purple); }
    .type-sum-card.ts-monthly{ background: rgba(255,166,87,.06); }
    .type-sum-card.ts-monthly::before{ background: var(--orange); }
    .type-sum-card.ts-other  { background: rgba(139,148,158,.06); }
    .type-sum-card.ts-other::before  { background: var(--muted); }
    .type-sum-card.active, .type-sum-card:hover {
      border-color: var(--blue);
    }
    .type-sum-card.ts-short.active,  .type-sum-card.ts-short:hover  { border-color: var(--blue); }
    .type-sum-card.ts-weekly.active, .type-sum-card.ts-weekly:hover { border-color: var(--purple); }
    .type-sum-card.ts-monthly.active,.type-sum-card.ts-monthly:hover{ border-color: var(--orange); }
    .type-sum-card.ts-other.active,  .type-sum-card.ts-other:hover  { border-color: var(--muted); }
    .ts-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .ts-nums  { display: flex; align-items: baseline; gap: 4px; }
    .ts-done  { font-size: 20px; font-weight: 700; }
    .ts-total { font-size: 12px; color: var(--muted); }
    .ts-short  .ts-done { color: var(--blue); }
    .ts-weekly .ts-done { color: var(--purple); }
    .ts-monthly .ts-done{ color: var(--orange); }
    .ts-other  .ts-done { color: var(--muted); }
    .ts-bar { height: 4px; background: rgba(48,54,61,.8); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .ts-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }
    .ts-short  .ts-bar-fill { background: var(--blue); }
    .ts-weekly .ts-bar-fill { background: var(--purple); }
    .ts-monthly .ts-bar-fill{ background: var(--orange); }
    .ts-other  .ts-bar-fill { background: var(--muted); }
    .ts-rate { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Type mini-badges in table ── */
    .type-mini-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .type-mini {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 10px;
      font-size: 11px; font-weight: 500;
      border: 1px solid transparent;
    }
    .type-mini.tm-short   { background: rgba(88,166,255,.12);  color: var(--blue);   border-color: rgba(88,166,255,.25); }
    .type-mini.tm-weekly  { background: rgba(188,140,255,.12); color: var(--purple); border-color: rgba(188,140,255,.25); }
    .type-mini.tm-monthly { background: rgba(255,166,87,.12);  color: var(--orange); border-color: rgba(255,166,87,.25); }
    .type-mini.tm-other   { background: rgba(139,148,158,.10); color: var(--muted);  border-color: rgba(139,148,158,.2); }
    .type-mini.tm-done    { opacity: 1; }
    .type-mini.tm-going   { opacity: 1; }
    .type-mini.tm-wait    { opacity: .6; }

    /* Responsive */
    @media (max-width: 1100px) {
      .summary-row { grid-template-columns: repeat(3, 1fr); }
      .main-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .summary-row { grid-template-columns: repeat(2, 1fr); padding: 16px; }
      .main-grid { padding: 12px 16px; }
      .header { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">📦</div>
    <div>
      <div class="header-title">东莞门店盘点完成情况</div>
      <div class="header-sub">实时监控看板 · 数据来源：盘点单导出.xlsx（2026-04-25）</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>实时更新</div>
    <div class="update-time" id="updateTime">最后更新：--</div>
  </div>
</div>

<!-- Summary Cards -->
<div class="summary-row">
  <div class="sum-card blue">
    <div class="sum-label">门店总数</div>
    <div class="sum-value" id="totalStores">18</div>
    <div class="sum-sub">东莞全区门店</div>
  </div>
  <div class="sum-card green">
    <div class="sum-label">已完成</div>
    <div class="sum-value" id="doneCount">7</div>
    <div class="sum-sub">完成率 <span id="doneRate">38.9%</span></div>
  </div>
  <div class="sum-card yellow">
    <div class="sum-label">进行中</div>
    <div class="sum-value" id="goingCount">6</div>
    <div class="sum-sub">正在盘点</div>
  </div>
  <div class="sum-card red">
    <div class="sum-label">未开始</div>
    <div class="sum-value" id="waitCount">5</div>
    <div class="sum-sub">待启动</div>
  </div>
  <div class="sum-card purple">
    <div class="sum-label">SKU盘点完成率</div>
    <div class="sum-value" id="totalDiff">—</div>
    <div class="sum-sub">已盘/计划SKU</div>
  </div>
</div>

<!-- Main Grid -->
<div class="main-grid">

  <!-- Table -->
  <div class="table-card">
    <div class="card-header">
      <div class="card-title">各门店盘点明细</div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
        <div class="filter-row" style="gap:4px;">
          <span style="font-size:11px;color:var(--muted);margin-right:4px;">盘点类型</span>
          <button class="filter-btn type-btn active" onclick="filterType('all',this)">全部</button>
          <button class="filter-btn type-btn" onclick="filterType('short',this)">🧊 短保盘</button>
          <button class="filter-btn type-btn" onclick="filterType('weekly',this)">📅 周盘</button>
          <button class="filter-btn type-btn" onclick="filterType('monthly',this)">📊 月度盲盘</button>
        </div>
        <div class="filter-row">
          <button class="filter-btn status-btn active" onclick="filterStatus('all',this)">全部状态</button>
          <button class="filter-btn status-btn" onclick="filterStatus('done',this)">已完成</button>
          <button class="filter-btn status-btn" onclick="filterStatus('going',this)">进行中/审核中</button>
          <button class="filter-btn status-btn" onclick="filterStatus('wait',this)">未开始</button>
        </div>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>门店名称</th>
            <th>所属区域</th>
            <th>门店状态</th>
            <th>SKU盘点进度</th>
            <th>已盘/计划SKU</th>
            <th>盘点单总数</th>
            <th>已完成</th>
            <th>进行中</th>
            <th>待盘点</th>
            <th id="typeColHeader">各类型完成情况</th>
          </tr>
        </thead>
        <tbody id="storeTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">

    <!-- Donut -->
    <div class="donut-card">
      <div class="card-title">完成状态分布</div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="40" fill="none" stroke="#1c2230" stroke-width="18"/>
          <!-- done -->
          <circle id="donutDone" cx="55" cy="55" r="40" fill="none"
            stroke="#3fb950" stroke-width="18"
            stroke-dasharray="0 251.2"
            stroke-dashoffset="0"
            transform="rotate(-90 55 55)"
            style="transition:stroke-dasharray .8s ease"/>
          <!-- going -->
          <circle id="donutGoing" cx="55" cy="55" r="40" fill="none"
            stroke="#58a6ff" stroke-width="18"
            stroke-dasharray="0 251.2"
            stroke-dashoffset="0"
            transform="rotate(-90 55 55)"
            style="transition:stroke-dasharray .8s ease"/>
          <!-- wait -->
          <circle id="donutWait" cx="55" cy="55" r="40" fill="none"
            stroke="#30363d" stroke-width="18"
            stroke-dasharray="0 251.2"
            stroke-dashoffset="0"
            transform="rotate(-90 55 55)"
            style="transition:stroke-dasharray .8s ease"/>
          <text x="55" y="51" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700" id="donutPct">39%</text>
          <text x="55" y="65" text-anchor="middle" fill="#8b949e" font-size="10">完成率</text>
        </svg>
        <div class="donut-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--green)"></div>
            <div class="legend-label">已完成</div>
            <div class="legend-val" id="lgDone">7</div>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--blue)"></div>
            <div class="legend-label">进行中</div>
            <div class="legend-val" id="lgGoing">6</div>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--border)"></div>
            <div class="legend-label">未开始</div>
            <div class="legend-val" id="lgWait">5</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bar chart: progress by area -->
    <div class="donut-card">
      <div class="card-title">各区域完成率</div>
      <div class="bar-chart" id="areaBarChart"></div>
    </div>

    <!-- Type summary -->
    <div class="donut-card">
      <div class="card-title">盘点类型汇总</div>
      <div class="type-summary-grid" id="typeSummaryGrid"></div>
    </div>

    <!-- Alert list -->
    <div class="alert-card">
      <div class="card-header" style="padding:14px 16px;">
        <div class="card-title">⚡ 实时动态</div>
      </div>
      <div id="alertList"></div>
    </div>

  </div>
</div>

<script>
// ── Real Data (from 东莞门店.xlsx + 盘点单导出.xlsx, 2026-04-25) ──────────
// 门店名单来源：东莞门店.xlsx（47家，含区域）
// 盘点数据来源：盘点单导出.xlsx

function storeStatus(sc) {
  if (sc['待盘点']) return 'wait';
  if (sc['盘点中'] || sc['审核中'] || sc['待提交']) return 'going';
  return 'done';
}

// [fullName, area, {status_counts, plan_sku, done_sku, total_tasks, type_counts}]
// type_counts: short=短保盘, weekly=周盘, monthly=月度盲盘, other=其他
// 数据更新时间：2026-04-25
const rawData = [
  ["歪马送酒（东坑店）", "东莞三区", {"status_counts": {}, "plan_sku": 0, "done_sku": 0, "total_tasks": 0, "type_counts": {"short": {"status_counts": {}, "plan_sku": 0, "done_sku": 0, "total_tasks": 0}, "weekly": {"status_counts": {}, "plan_sku": 0, "done_sku": 0, "total_tasks": 0}, "monthly": {"status_counts": {}, "plan_sku": 0, "done_sku": 0, "total_tasks": 0}, "other": {"status_counts": {}, "plan_sku": 0, "done_sku": 0, "total_tasks": 0}}}],

// 构建 stores 数组
function buildStoreEntry(fullName, area, d) {
  const shortName = fullName.replace('歪马送酒（', '').replace('）', '');
  const sc = d.status_counts;
  const status = storeStatus(sc);
  const doneTasks    = sc['已完成'] || 0;
  const goingTasks   = (sc['盘点中']||0) + (sc['审核中']||0) + (sc['待提交']||0);
  const waitTasks    = sc['待盘点'] || 0;
  const invalidTasks = sc['已失效'] || 0;
  return {
    name: shortName,
    fullName,
    area,
    status,
    total: d.plan_sku,
    done: d.done_sku,
    totalTasks: d.total_tasks,
    doneTasks,
    goingTasks,
    waitTasks,
    invalidTasks,
    validTotal: d.total_tasks - invalidTasks,
    statusCounts: sc,
    typeCounts: d.type_counts || {},
  };
}

const stores = rawData.map(([fullName, area, d], idx) => ({
  id: idx + 1,
  ...buildStoreEntry(fullName, area, d),
}));

// ── Helpers ────────────────────────────────────────────────────────────────
function pct(done, total) {
  if (!total) return 0;
  return Math.round(done / total * 100);
}
function fmtAmt(v) {
  if (v === 0) return '<span class="diff-zero">—</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'diff-pos' : 'diff-neg';
  return `<span class="${cls}">${sign}¥${Math.abs(v).toLocaleString()}</span>`;
}
function fmtQty(v) {
  if (v === 0) return '<span class="diff-zero">—</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'diff-pos' : 'diff-neg';
  return `<span class="${cls}">${sign}${v}</span>`;
}
function progColor(p) {
  if (p >= 100) return 'var(--green)';
  if (p >= 50)  return 'var(--blue)';
  if (p > 0)    return 'var(--yellow)';
  return 'var(--border)';
}
function statusBadge(s) {
  if (s === 'done')  return '<span class="badge done"><span class="badge-dot"></span>已完成</span>';
  if (s === 'going') return '<span class="badge going"><span class="badge-dot"></span>进行中</span>';
  return '<span class="badge wait"><span class="badge-dot"></span>未开始</span>';
}

// ── Type / Status filter state ─────────────────────────────────────────────
let currentType   = 'all';   // 'all' | 'short' | 'weekly' | 'monthly'
let currentStatus = 'all';   // 'all' | 'done' | 'going' | 'wait'

const TYPE_LABEL = { all:'全部', short:'🧊 短保盘', weekly:'📅 周盘', monthly:'📊 月度盲盘' };
const TYPE_KEYS  = ['short', 'weekly', 'monthly'];

// 根据 type_counts 中某类型的 status_counts 判断该类型的状态
function typeStatus(tc) {
  if (!tc || tc.total_tasks === 0) return null;  // 该门店无此类型盘点
  const sc = tc.status_counts || {};
  if (sc['待盘点']) return 'wait';
  if (sc['盘点中'] || sc['审核中'] || sc['待提交']) return 'going';
  return 'done';
}

// 生成"各类型完成情况"列内容（彩色迷你标签）
const TYPE_MINI_CLASS = { short:'tm-short', weekly:'tm-weekly', monthly:'tm-monthly', other:'tm-other' };
const TYPE_SHORT_LABEL = { short:'短保', weekly:'周盘', monthly:'月盲', other:'其他' };

function typeColCell(s) {
  if (currentType !== 'all') {
    // 已选某类型：显示该类型的完成/总数 + 小进度条
    const tc = s.typeCounts[currentType];
    if (!tc || tc.total_tasks === 0) return '<span style="color:var(--muted)">—</span>';
    const done  = (tc.status_counts['已完成'] || 0);
    const going = (tc.status_counts['盘点中']||0)+(tc.status_counts['审核中']||0)+(tc.status_counts['待提交']||0);
    const total = tc.total_tasks;
    const p = pct(done, total);
    const ts = typeStatus(tc);
    const stCls = ts === 'done' ? 'tm-done' : ts === 'going' ? 'tm-going' : 'tm-wait';
    const mc = TYPE_MINI_CLASS[currentType];
    return `<span class="type-mini ${mc} ${stCls}">${done}/${total} 完成</span>`;
  }
  // 全部类型：每种类型一个彩色迷你标签
  const parts = [...TYPE_KEYS, 'other'].map(key => {
    const tc = s.typeCounts[key];
    if (!tc || tc.total_tasks === 0) return '';
    const done  = (tc.status_counts['已完成'] || 0);
    const total = tc.total_tasks;
    const ts    = typeStatus(tc);
    const stCls = ts === 'done' ? 'tm-done' : ts === 'going' ? 'tm-going' : 'tm-wait';
    const mc    = TYPE_MINI_CLASS[key];
    const lbl   = TYPE_SHORT_LABEL[key];
    return `<span class="type-mini ${mc} ${stCls}">${lbl} ${done}/${total}</span>`;
  }).filter(Boolean);
  return parts.length
    ? `<div class="type-mini-row">${parts.join('')}</div>`
    : '<span style="color:var(--muted)">—</span>';
}

// ── Render Table ───────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('storeTableBody');

  // 先按类型筛选（若选了具体类型，只保留该类型有盘点单的门店）
  let list = stores;
  if (currentType !== 'all') {
    list = stores.filter(s => {
      const tc = s.typeCounts[currentType];
      return tc && tc.total_tasks > 0;
    });
  }

  // 再按状态筛选（状态基于当前类型）
  if (currentStatus !== 'all') {
    list = list.filter(s => {
      if (currentType === 'all') {
        return s.status === currentStatus;
      } else {
        return typeStatus(s.typeCounts[currentType]) === currentStatus;
      }
    });
  }

  // 更新表头"各类型完成情况"列文字
  const hdr = document.getElementById('typeColHeader');
  if (hdr) {
    hdr.textContent = currentType === 'all' ? '各类型完成情况' : `${TYPE_LABEL[currentType]} 完成情况`;
  }

  tbody.innerHTML = list.map(s => {
    // 当前展示的 SKU 进度：若选了具体类型则用该类型数据
    let dispDone = s.done, dispTotal = s.total;
    let dispDoneTasks = s.doneTasks, dispGoingTasks = s.goingTasks, dispWaitTasks = s.waitTasks, dispTotalTasks = s.totalTasks;
    let dispStatus = s.status;
    if (currentType !== 'all') {
      const tc = s.typeCounts[currentType] || {};
      dispDone  = tc.done_sku  || 0;
      dispTotal = tc.plan_sku  || 0;
      dispDoneTasks  = (tc.status_counts && tc.status_counts['已完成']) || 0;
      dispGoingTasks = tc.status_counts ? ((tc.status_counts['盘点中']||0)+(tc.status_counts['审核中']||0)+(tc.status_counts['待提交']||0)) : 0;
      dispWaitTasks  = (tc.status_counts && tc.status_counts['待盘点']) || 0;
      dispTotalTasks = tc.total_tasks || 0;
      dispStatus = typeStatus(tc) || 'done';
    }
    const p = pct(dispDone, dispTotal);
    return `<tr data-status="${dispStatus}">
      <td><div class="store-name">${s.name}</div></td>
      <td style="color:var(--muted);font-size:12px">${s.area}</td>
      <td>${statusBadge(dispStatus)}</td>
      <td>
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${progColor(p)}"></div></div>
          <div class="prog-pct">${p}%</div>
        </div>
      </td>
      <td style="color:var(--muted)">${dispDone.toLocaleString()} / ${dispTotal.toLocaleString()}</td>
      <td style="color:var(--muted);text-align:center">${dispTotalTasks}</td>
      <td style="color:var(--green);text-align:center">${dispDoneTasks}</td>
      <td style="text-align:center">${dispGoingTasks > 0 ? `<span style="color:var(--blue)">${dispGoingTasks}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="text-align:center">${dispWaitTasks > 0 ? `<span style="color:var(--yellow)">${dispWaitTasks}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="font-size:12px">${typeColCell(s)}</td>
    </tr>`;
  }).join('');
}

function renderAll() {
  renderSummary();
  renderTable();
  renderAreaChart();
  renderTypeSummary();
}

function filterType(t, btn) {
  currentType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

function filterStatus(f, btn) {

  btn.classList.add('active');

}

// ── Render Summary（支持按类型联动）──────────────────────────────────────
function renderSummary() {
  // 根据当前类型筛选计算状态
  function getStatus(s) {
    if (currentType === 'all') return s.status;
    const tc = s.typeCounts[currentType];
    if (!tc || tc.total_tasks === 0) return null;
    return typeStatus(tc);
  }
  const relevant = currentType === 'all'
    ? stores
    : stores.filter(s => { const tc = s.typeCounts[currentType]; return tc && tc.total_tasks > 0; });

  const done  = relevant.filter(s => getStatus(s) === 'done').length;
  const going = relevant.filter(s => getStatus(s) === 'going').length;
  const wait  = relevant.filter(s => getStatus(s) === 'wait').length;
  const total = relevant.length || 1;
  const rate  = Math.round(done / total * 100);

  let totalSku, doneSku;
  if (currentType === 'all') {
    totalSku = stores.reduce((a, s) => a + s.total, 0);
    doneSku  = stores.reduce((a, s) => a + s.done, 0);
  } else {
    totalSku = stores.reduce((a, s) => a + ((s.typeCounts[currentType]||{}).plan_sku||0), 0);
    doneSku  = stores.reduce((a, s) => a + ((s.typeCounts[currentType]||{}).done_sku||0), 0);
  }
  const skuRate = totalSku ? Math.round(doneSku / totalSku * 100) : 0;

  document.getElementById('totalStores').textContent = currentType === 'all' ? stores.length : relevant.length;
  document.getElementById('doneCount').textContent   = done;
  document.getElementById('goingCount').textContent  = going;
  document.getElementById('waitCount').textContent   = wait;
  document.getElementById('doneRate').textContent    = rate + '%';
  document.getElementById('totalDiff').textContent   = skuRate + '%';

  // Legend
  document.getElementById('lgDone').textContent  = done;
  document.getElementById('lgGoing').textContent = going;
  document.getElementById('lgWait').textContent  = wait;
  document.getElementById('donutPct').textContent = rate + '%';

  // Donut
  const C = 251.2;
  const doneArc  = C * done  / total;
  const goingArc = C * going / total;
  const waitArc  = C * wait  / total;
  const d = document.getElementById('donutDone');
  const g = document.getElementById('donutGoing');
  const w = document.getElementById('donutWait');
  d.setAttribute('stroke-dasharray', `${doneArc} ${C - doneArc}`);
  d.setAttribute('stroke-dashoffset', '0');
  g.setAttribute('stroke-dasharray', `${goingArc} ${C - goingArc}`);
  g.setAttribute('stroke-dashoffset', `${-doneArc}`);
  w.setAttribute('stroke-dasharray', `${waitArc} ${C - waitArc}`);
  w.setAttribute('stroke-dashoffset', `${-(doneArc + goingArc)}`);
}

// ── Area Bar Chart（支持按类型联动）──────────────────────────────────────
function renderAreaChart() {
  const areaMap = {};
  stores.forEach(s => {
    if (!areaMap[s.area]) areaMap[s.area] = { done: 0, total: 0 };
    if (currentType === 'all') {
      areaMap[s.area].total++;
      if (s.status === 'done') areaMap[s.area].done++;
    } else {
      const tc = s.typeCounts[currentType];
      if (tc && tc.total_tasks > 0) {
        areaMap[s.area].total++;
        if (typeStatus(tc) === 'done') areaMap[s.area].done++;
      }
    }
  });
  const areas = Object.entries(areaMap)
    .filter(([, v]) => v.total > 0)
    .map(([name, v]) => ({ name, rate: Math.round(v.done / v.total * 100), done: v.done, total: v.total }))
    .sort((a, b) => b.rate - a.rate);

  const typeColor = { all:'#3fb950', short:'#58a6ff', weekly:'#bc8cff', monthly:'#ffa657', other:'#8b949e' };
  const barColor = typeColor[currentType] || '#3fb950';
  document.getElementById('areaBarChart').innerHTML = areas.map(a => `
    <div class="bar-row">
      <div class="bar-label" title="${a.name}">${a.name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${a.rate}%;background:${barColor}"></div>
      </div>
      <div class="bar-num">${a.rate}%</div>
    </div>
  `).join('');
}

// ── Type Summary Cards ─────────────────────────────────────────────────────
function renderTypeSummary() {
  const TYPE_INFO = [
    { key:'short',   label:'🧊 短保盘',   cls:'ts-short'   },
    { key:'weekly',  label:'📅 周盘',     cls:'ts-weekly'  },
    { key:'monthly', label:'📊 月度盲盘', cls:'ts-monthly' },
    { key:'other',   label:'📋 其他',     cls:'ts-other'   },
  ];
  const grid = document.getElementById('typeSummaryGrid');
  grid.innerHTML = TYPE_INFO.map(({ key, label, cls }) => {
    let doneStores = 0, goingStores = 0, waitStores = 0, totalStoresWithType = 0;
    stores.forEach(s => {
      const tc = s.typeCounts[key];
      if (!tc || tc.total_tasks === 0) return;
      totalStoresWithType++;
      const ts = typeStatus(tc);
      if (ts === 'done')  doneStores++;
      else if (ts === 'going') goingStores++;
      else waitStores++;
    });
    if (totalStoresWithType === 0) return '';
    const rate = Math.round(doneStores / totalStoresWithType * 100);
    const isActive = currentType === key ? 'active' : '';
    return `
      <div class="type-sum-card ${cls} ${isActive}" onclick="clickTypeCard('${key}')">
        <div class="ts-label">${label}</div>
        <div class="ts-nums">
          <span class="ts-done">${doneStores}</span>
          <span class="ts-total">/ ${totalStoresWithType} 家</span>
        </div>
        <div class="ts-bar"><div class="ts-bar-fill" style="width:${rate}%"></div></div>
        <div class="ts-rate">完成率 ${rate}%　进行中 ${goingStores}　待盘 ${waitStores}</div>
      </div>`;
  }).join('');
}

function clickTypeCard(key) {
  // 同步顶部筛选按钮
  const newType = (currentType === key) ? 'all' : key;
  currentType = newType;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${newType}'`));
  });
  // 若切换到 all，激活"全部"按钮
  if (newType === 'all') {
    document.querySelector('.type-btn[onclick*="\'all\'"]').classList.add('active');
  }
  renderAll();
}

      <div>
        <div class="alert-text">${a.text}</div>
        <div class="alert-time">今日 ${a.time}</div>
      </div>
    </div>
  `).join('');
}

// ── Update Time ────────────────────────────────────────────────────────────
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('updateTime').textContent = `最后更新：${h}:${m}:${s}`;
}

// ── Init ───────────────────────────────────────────────────────────────────
renderSummary();
renderTable();
renderAreaChart();
renderTypeSummary();
renderAlerts();
updateTime();
</script>
</body>
